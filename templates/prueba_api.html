<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Probar API Flask</title>
</head>
<body>
    <h1>Pruebas de API</h1>

    <h2>1. Login</h2>
    <input type="email" id="login_email" placeholder="Correo">
    <input type="password" id="login_password" placeholder="Contraseña">
    <button onclick="login()">Iniciar sesión</button>

    <hr>

    <h2>2. Listar usuarios</h2>
    <button onclick="listarUsuarios()">Obtener usuarios</button>

    <hr>

    <h2>3. Crear usuario</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="role" placeholder="Role">

    <br><br>

    <input type="text" id="token" placeholder="Pega aquí el token JWT" size="100">
    <button onclick="crearUsuario()">Crear usuario</button>

    <h2>Resultado</h2>
    <pre id="resultado"></pre>

    <script>
        let token = "";

        function mostrarResultado(data) {
            document.getElementById("resultado").textContent =
                JSON.stringify(data, null, 2);
        }

        function mostrarError(error) {
            document.getElementById("resultado").textContent =
                "Error: " + error;
        }

        function obtenerTokenActual() {
            return document.getElementById("token").value.trim() || token;
        }

        async function login() {
            try {
                const datos = {
                    email: document.getElementById("login_email").value,
                    password: document.getElementById("login_password").value
                };

                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(datos)
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarResultado(data);
                    return;
                }

                token = data.access_token || "";
                document.getElementById("token").value = token;
                mostrarResultado(data);
                console.log("Token guardado:", token);
            } catch (error) {
                mostrarError(error);
            }
        }

        async function listarUsuarios() {
            try {
                const tokenActual = obtenerTokenActual();

                const headers = {
                    "Content-Type": "application/json"
                };

                if (tokenActual) {
                    headers["Authorization"] = "Bearer " + tokenActual;
                }

                const response = await fetch("/api/usuarios", {
                    method: "GET",
                    headers: headers
                });

                const data = await response.json();
                mostrarResultado(data);
            } catch (error) {
                mostrarError(error);
            }
        }

        async function crearUsuario() {
            try {
                const tokenActual = obtenerTokenActual();

                if (!tokenActual) {
                    mostrarError("Debes iniciar sesión o pegar un token JWT.");
                    return;
                }

                const datos = {
                    nombre: document.getElementById("nombre").value,
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value,
                    role: document.getElementById("role").value
                };

                const response = await fetch("/api/usuarios", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + tokenActual
                    },
                    body: JSON.stringify(datos)
                });

                const data = await response.json();
                mostrarResultado(data);
            } catch (error) {
                mostrarError(error);
            }
        }
    </script>
</body>
</html>

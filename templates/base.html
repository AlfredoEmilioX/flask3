<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        ul {
            list-style: none;
            float: right;
        }
        li {
            display: inline-block;
        }
        a {
            margin: 2px;
            padding: 5px 10px;
            text-decoration: none;
        }
    </style>
</head>
<body class="container">

<header class="mt-3 mb-4">
    <h2>Sistema Académico</h2>
    <h6>Proyecto Flask</h6>

    <nav>
        <ul>
            <li><a href="/" class="btn btn-outline-primary btn-sm">Inicio</a></li>
            <li><a href="/usuarios" class="btn btn-outline-primary btn-sm">Usuarios</a></li>
            <li><a href="/cursos" class="btn btn-outline-primary btn-sm">Cursos</a></li>
            <li><a href="/inscripciones" class="btn btn-outline-primary btn-sm">Inscripciones</a></li>
            <li><a href="/inscripciones/nueva" class="btn btn-outline-success btn-sm">Nueva Inscripción</a></li>
        </ul>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="mt-4">
    <hr>
    <p class="text-center">© 2025 - Proyecto Flask</p>
</footer>

</body>
</html>
